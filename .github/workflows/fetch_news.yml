name: PLURIS — Fetch News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run news fetcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit updated news data
        run: |
          git config --local user.email "pluris-bot@users.noreply.github.com"
          git config --local user.name "PLURIS Bot"
          git add data/news.json
          git diff --staged --quiet || git commit -m "🌍 Update news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase && git push
